name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release

      - name: Prepare Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Move-Item target/release/calculator_pro.exe calculator-windows.exe

      - name: Prepare Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mv target/release/calculator_pro calculator-linux

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.os == 'windows-latest' && 'calculator-windows.exe' || 'calculator-linux' }}
          asset_name: ${{ matrix.os == 'windows-latest' && 'calculator-windows.exe' || 'calculator-linux' }}
          tag: ${{ github.ref }}
          overwrite: true